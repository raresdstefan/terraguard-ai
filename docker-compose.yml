version: '3.9'

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     terraguard
      POSTGRES_PASSWORD: terraguard
      POSTGRES_DB:       terraguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terraguard -d terraguard"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── RabbitMQ ────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"          # Management UI: http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── ML Service ──────────────────────────────────────────────────────────
  ml-service:
    build: ./ml-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Backend FastAPI ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Dezcommentează pentru acces serial USB (ESP32 conectat la server):
      # - /dev/ttyUSB0:/dev/ttyUSB0
    environment:
      - RABBITMQ_HOST=rabbitmq
      - DATABASE_URL=postgresql+asyncpg://terraguard:terraguard@postgres:5432/terraguard
      - ML_SERVICE_URL=http://ml-service:8001
      # Modul ESP32: "simulated" | "http" | "serial"
      - ESP32_MODE=simulated
      # - SERIAL_PORT=/dev/ttyUSB0
      # - SERIAL_BAUD=115200
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  # ── Frontend React ──────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:    # Date PostgreSQL persistente între restart-uri
